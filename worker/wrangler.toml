# ============================================================
# Qorax API Worker — конфигурация Cloudflare Workers
# ============================================================
# Секреты (SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY и т.д.) НЕ хранятся
# здесь в открытом виде — задаются через `wrangler secret put <NAME>`
# или в Cloudflare Dashboard → Worker → Settings → Variables.
# ============================================================

name = "qorax-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Cron тригери керуються через Cloudflare Dashboard → qorax-api → Settings → Trigger events
# (вручну додані: */5 * * * *, 0 3 * * *, 0 4 1 * *, 0 5 * * *, 30 4 * * 0)
# НЕ вказуємо [triggers] тут — wrangler намагається перезаписати їх через API і падає з помилкою.

# Публичные (не секретные) переменные окружения
[vars]
ENVIRONMENT = "production"

# Секрети задаються через Cloudflare Dashboard → Worker → Settings → Variables and Secrets:
# SUPABASE_URL             — https://hfyetlipxjqogbpntoif.supabase.co
# SUPABASE_SERVICE_ROLE_KEY
# GEMINI_API_KEY
# GOOGLE_PAGESPEED_API_KEY
# RESEND_API_KEY
# TELEGRAM_BOT_TOKEN
