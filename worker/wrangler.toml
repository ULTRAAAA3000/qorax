# ============================================================
# Qorax API Worker — конфигурация Cloudflare Workers
# ============================================================
# Секреты (SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY и т.д.) НЕ хранятся
# здесь в открытом виде — задаются через `wrangler secret put <NAME>`
# или в Cloudflare Dashboard → Worker → Settings → Variables.
# ============================================================

name = "qorax-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# KV namespace для rate limiting публічних ендпоінтів (наприклад /api/audit).
# Namespace потрібно створити вручну: Cloudflare Dashboard → Workers & Pages →
# KV → Create namespace (назва "qorax-rate-limit"), потім вписати сюди id.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "93717dc8e540476cb04642ee0fbd86b5"


# Cron тригери керуються через Cloudflare Dashboard → qorax-api → Settings → Trigger events
# (вручну додані: */5 * * * *, 0 3 * * *, 0 4 1 * *, 0 5 * * *, 30 4 * * 0)
# Тригери (cron) керуються вручну через Cloudflare Dashboard → Workers → qorax-api → Settings → Trigger events
# НЕ вказуємо [triggers] тут — Cloudflare API не дозволяє їх оновлювати через wrangler в цьому акаунті

# Публичные (не секретные) переменные окружения
[vars]
ENVIRONMENT = "production"
SUPABASE_URL = "https://hfyetlipxjqogbpntoif.supabase.co"

# Секрети задаються через Cloudflare Dashboard → Worker → Settings → Variables and Secrets:
# SUPABASE_URL             — https://hfyetlipxjqogbpntoif.supabase.co
# SUPABASE_SERVICE_ROLE_KEY
# GEMINI_API_KEY
# GOOGLE_PAGESPEED_API_KEY
# RESEND_API_KEY
# TELEGRAM_BOT_TOKEN
