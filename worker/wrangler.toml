# ============================================================
# Qorax API Worker — конфигурация Cloudflare Workers
# ============================================================
# Секреты (SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY и т.д.) НЕ хранятся
# здесь в открытом виде — задаются через `wrangler secret put <NAME>`
# или в Cloudflare Dashboard → Worker → Settings → Variables.
# ============================================================

name = "qorax-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Cron-розклад моніторингу:
#   */5 * * * *  — uptime + базовий статус SSL (часто, легка перевірка)
#   0 3 * * *    — швидкість + Core Web Vitals через PageSpeed (раз на день,
#                  важка операція + денна квота API, тому рідше)
#   0 4 1 * *    — генерація PDF звітів (перший день місяця о 4:00)
#   0 5 * * *    — перевірка закінчення тріалів → перевід на free
[triggers]
crons = ["*/5 * * * *", "0 3 * * *", "0 4 1 * *", "0 5 * * *", "30 4 * * 0"]

# Публичные (не секретные) переменные окружения
[vars]
ENVIRONMENT = "production"

# Секрети задаються через Cloudflare Dashboard → Worker → Settings → Variables and Secrets:
# SUPABASE_URL             — https://hfyetlipxjqogbpntoif.supabase.co
# SUPABASE_SERVICE_ROLE_KEY
# GEMINI_API_KEY
# GOOGLE_PAGESPEED_API_KEY
# RESEND_API_KEY
# TELEGRAM_BOT_TOKEN
